<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="curd.css">
</head>
<body>
    <table>
        <tr>
            <td>
                <form onsubmit="event.preventDefault(); onFormsubmit();" autocomplete="off ">
                    <div>
                        <label for="">ENTER TASK DETAIL</label>
                        <input type="text" name="fullname"  id="fullname" required>
                    </div>
                    <div>
                        <label for="">ENTER DATE</label>
                        <input type="date" name="empcode"  id="empcode" required>
                    </div>
                    <div>
                        <label for="">PROJECT DETAIL</label>
                        <input type="text" name="salery"   id="salery" required>
                    </div>
                    <div>
                        <label for="">FINAL DATE</label>
                        <input type="date" name="city"  id="city" required>
                    </div>
                    <div class="actionbtn">
                        <input type="submit" value="submit" id="submit" >
                    </div>
                </form>
            </td>
            <td>
                <table class="list" id="emplist">
                    <thead>
                        <tr>
                            <th>TASK</th>
                            <th>DATE</th>
                            <th>DISCRIPTION</th>
                            <th>END </th>
                         </tr>
                    </thead>
                    <tbody>
                        
                    </tbody>
                </table>
                
            </td>
        </tr>
    </table>
    
</body>
<script src="curd.js"></script>
</html>
